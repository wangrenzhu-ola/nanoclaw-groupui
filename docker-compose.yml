services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - webui

  webui:
    build:
      context: ./webui
    environment:
      - DATABASE_URL=file:/app/groups/messages.db
      - RUNTIME_DB_URL=file:/app/groups/messages.db
      - GROUPS_PATH=/app/groups
      - AUTH_SECRET=supersecret
      - ADMIN_PASSWORD=admin
    volumes:
      - ./groups:/app/groups

  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    volumes:
      - ./groups:/app/groups
      - /var/run/docker.sock:/var/run/docker.sock
    # command: ["node", "dist/index.js"] # Removed override to use Dockerfile CMD
    environment:
      - GROUPS_PATH=/app/groups
      - STORE_DIR=/app/groups
      - LOG_LEVEL=debug
      - CREDENTIAL_PROXY_PORT=3002
      - WEBUI_URL=http://webui:3000
      - ANTHROPIC_BASE_URL=https://api.minimax.chat/v1
      - ANTHROPIC_AUTH_TOKEN=sk-cp-oPQB9N6tKZCICzNkHIywhKrHNiZmbJ_KZG2s-MDdB8Yyc9q5jIbBP4vaRVwV04_42JDeesO83C8mZDWOaJUiZc0eIcfuZkw7vbygAfxFoQR9dgBQD0DrjG0
      - MODEL_NAME=abab6.5s-chat
    depends_on:
      - webui
